name: "Lint"
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    runs-on:  ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
      - run:  npm install
      - run: npm run lint
      - run: echo "::error Failed lint test"
        if: failure()    