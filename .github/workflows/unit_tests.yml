name: "Lint"
on:
  push:
  pull_request:
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
      - run: npm install
      - run: npx vitest
      - run: echo "::error Failed unit test"
        if: failure()    